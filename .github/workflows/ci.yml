name: CI

on:
  pull_request:
  push:
    branches: [develop, main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: expansao360
          POSTGRES_USER: expansao360
          POSTGRES_PASSWORD: expansao360
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U expansao360 -d expansao360"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=20

    env:
      # Banco (alinha com settings.py)
      DB_ENGINE: postgres
      DB_HOST: 127.0.0.1
      DB_PORT: "5432"
      DB_NAME: expansao360
      DB_USER: expansao360
      DB_PASSWORD: expansao360

      # Django
      DJANGO_DEBUG: "0"
      DJANGO_SETTINGS_MODULE: config.settings

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (pip)
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          # Se você não tiver psycopg no pyproject/requirements ainda:
          # pip install "psycopg[binary]" python-dotenv

      - name: Run migrations
        run: |
          python web/manage.py migrate

      - name: Run tests
        run: |
          pytest -qq