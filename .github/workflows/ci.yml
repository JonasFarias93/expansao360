name: CI

on:
  push:
    branches: [ "develop", "main" ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: expansao360
          POSTGRES_USER: expansao360
          POSTGRES_PASSWORD: expansao360
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U expansao360 -d expansao360"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      DB_ENGINE: postgres
      DB_HOST: localhost
      DB_PORT: "5432"
      DB_NAME: expansao360
      DB_USER: expansao360
      DB_PASSWORD: expansao360
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Conda (environment.yml)
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          miniforge-variant: Miniforge3
          use-mamba: true
          environment-file: environment.yml
          activate-environment: expansao360

      - name: Show Python
        shell: bash -l {0}
        run: |
          python --version
          pip --version

      - name: Install deps (pyproject)
        shell: bash -l {0}
        run: |
          make deps-install

      - name: Run tests (pytest)
        shell: bash -l {0}
        run: |
          make test-py


            - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run tests (jest)
        run: |
          npm ci
          make test-js