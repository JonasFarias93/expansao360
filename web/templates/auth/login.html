{% extends "base_public.html" %}
{% block title %}Login — EXPANSÃO360{% endblock %}
{% block content %}
<div class="min-h-screen bg-slate-900 flex items-center justify-center px-4">
  <div class="w-full max-w-sm space-y-6">

    <div class="text-center">
      <div class="text-2xl font-bold text-white tracking-tight">EXPANSÃO360</div>
      <div class="text-sm text-slate-400 mt-1">Operação & Cadastro</div>
    </div>

    <div class="bg-white rounded-2xl shadow-xl p-8 space-y-5">
      <h1 class="text-lg font-semibold text-slate-900">Entrar</h1>

      {% if form.errors %}
      <div class="rounded-lg bg-red-50 border border-red-200 px-4 py-3 text-sm text-red-700">
        Usuário ou senha inválidos.
      </div>
      {% endif %}

      <form method="post" class="space-y-4">
        {% csrf_token %}
        <input type="hidden" name="next" value="{{ next }}">

        <div>
          <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Usuário</label>
          <input
            type="text"
            name="username"
            autofocus
            autocomplete="username"
            class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-400"
            placeholder="username"
          />
        </div>

        <div>
          <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Senha</label>
          <input
            type="password"
            name="password"
            autocomplete="current-password"
            class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-400"
            placeholder="••••••••"
          />
        </div>

        <button
          type="submit"
          class="w-full bg-slate-900 text-white rounded-lg py-2 text-sm font-medium hover:bg-slate-700 transition"
        >
          Entrar
        </button>
      </form>
    </div>

    <div class="text-center text-xs text-slate-500">
      EXPANSÃO360 · Acesso restrito
    </div>
  </div>
</div>
{% endblock %}
